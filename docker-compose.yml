version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - EMIS_SECRET_KEY=${EMIS_SECRET_KEY:-dev-secret-key-change-me}
      - MONGO_URI=${MONGO_URI:-}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - ./:/app

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      - EMIS_SECRET_KEY=${EMIS_SECRET_KEY:-dev-secret-key-change-me}
      - MONGO_URI=${MONGO_URI:-}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  flower:
    build: .
    command: celery -A app.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    restart: unless-stopped
