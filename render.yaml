services:
  - type: web
    name: emis-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: EMIS_SECRET_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
    healthCheckPath: /health
    autoDeploy: true

  - type: worker
    name: emis-celery-worker
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: EMIS_SECRET_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
